services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ctb_app
      POSTGRES_USER: ctb
      POSTGRES_PASSWORD: ctb
    ports:
      - '5432:5432'
    volumes:
      - ctb-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ctb -d ctb_app']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    environment:
      PORT: 3010
      POSTGRES_URL: postgresql://ctb:ctb@postgres:5432/ctb_app
      REDIS_URL: redis://redis:6379
    ports:
      - '3010:3010'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3010/health').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  simulator-worker:
    build:
      context: ../..
      dockerfile: apps/simulator-worker/Dockerfile
    environment:
      POSTGRES_URL: postgresql://ctb:ctb@postgres:5432/ctb_app
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  ctb-postgres-data:
